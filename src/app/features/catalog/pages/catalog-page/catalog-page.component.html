<app-page-container>
  <h1>Каталог МотоТрек</h1>
  <h2>На этой странице представлены товары и спортивные разрешения</h2>

  <div class="catalog-grid" *ngIf="catalogStore.products.length > 0">
    @for (product of catalogStore.products; track product.id) {
      @if (product && product.isVisible) {
        <app-product-card [product]="product" [routerLink]="['/catalog', product.id]"> </app-product-card>
      }
    }
  </div>

  <div *ngIf="catalogStore.products.length === 0" class="empty-state">
    <p>Товары не найдены</p>
  </div>
</app-page-container>
