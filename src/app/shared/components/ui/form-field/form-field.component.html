<div class="form-field">
  <label [for]="fieldId() || label()" class="form-field__label">
    {{ label() }}
    @if (required()) {
    <span class="form-field__required">*</span>
    }
  </label>
  @switch (fieldType()) { @case ('string') {
  <input
    [id]="fieldId() || label()"
    [formControl]="control()"
    [type]="type()"
    [placeholder]="placeholder()"
    [class.form-field__input--error]="hasError()"
    class="form-field__input"
  />
  } @case ('select') {
  <select [id]="fieldId() || label()" [formControl]="control()" [class.form-field__select--error]="hasError()" class="form-field__select">
    @for (option of options(); track option.value) {
    <option [value]="option.value">{{ option.label }}</option>
    }
  </select>
  } @case ('textarea') {
  <textarea
    [id]="fieldId() || label()"
    [formControl]="control()"
    [placeholder]="placeholder()"
    [class.form-field__textarea--error]="hasError()"
    class="form-field__textarea"
    rows="4"
  ></textarea>
  } } @if (hasError() && errorMessage()) {
  <p class="form-field__error">{{ errorMessage() }}</p>
  } @else if (hint()) {
  <p class="form-field__hint">{{ hint() }}</p>
  }
</div>
